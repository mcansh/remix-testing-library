<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun DOM Module Demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .content {
            text-align: center;
        }
        .cursor-follow {
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="content">
        <h1 class="text-animate">欢迎来到有趣的DOM世界！</h1>
        <p class="text-color-animate">看看这段文字的颜色是如何变化的。</p>
        <div class="cursor-follow">
            鼠标移动到这里，看我跟随你！
        </div>
    </div>

    <!-- 引入fun-dom模块 -->
    <script src="index.js"></script>
    <!-- 使用模块 -->
    <script>
        import { addFunnyAnimation, randomizeBackgroundColor, changeTextColor, followCursor } from 'pretty-dom';

        // 给h1标签添加动画
        funDom.addFunnyAnimation('.text-animate', 'bounceInLeft');

        // 给p标签的文字颜色动态变化
        funDom.changeTextColor('.text-color-animate', 3000);

        // 使div元素跟随鼠标移动
        funDom.followCursor('.cursor-follow', { followSpeed: 0.05, maxDistance: 50 });
    </script>
</body>
</html>
